<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>專案全面翻新</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    function initMermaid() {
      const dark = document.documentElement.classList.contains('dark');
      mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        look: 'handDrawn',
        theme: 'base',
        themeVariables: dark ? {
          primaryColor: '#1e293b', primaryTextColor: '#e2e8f0', primaryBorderColor: '#fb923c',
          lineColor: '#94a3b8', secondaryColor: '#334155', tertiaryColor: '#0f172a',
          fontFamily: 'ui-sans-serif, system-ui, sans-serif', fontSize: '14px',
        } : {
          primaryColor: '#fff7ed', primaryTextColor: '#1e293b', primaryBorderColor: '#fb923c',
          lineColor: '#64748b', secondaryColor: '#f8fafc', tertiaryColor: '#ffffff',
          fontFamily: 'ui-sans-serif, system-ui, sans-serif', fontSize: '14px',
        },
        flowchart: { padding: 28, nodeSpacing: 55, rankSpacing: 72, curve: 'basis' },
      });
    }
    initMermaid();
  </script>
  <style>
    .section-card { @apply bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6 shadow-sm; }
    pre.tree { @apply bg-slate-900 text-emerald-400 text-xs sm:text-sm p-4 rounded-xl overflow-x-auto leading-relaxed; }
    .toc-link.active { @apply text-blue-600 dark:text-blue-400 font-semibold border-l-2 border-blue-600 pl-2; }
    .tag-schema { @apply bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300; }
    .tag-ui { @apply bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300; }
    .tag-bdd { @apply bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300; }
    details.fold > summary { list-style: none; }
    details.fold > summary::-webkit-details-marker { display: none; }
    details.fold > summary::marker { display: none; }
    details.fold[open] > summary .fold-chevron { transform: rotate(90deg); }
    .ai-claude { @apply bg-orange-50 text-orange-800 border-orange-200 dark:bg-orange-900/25 dark:text-orange-300 dark:border-orange-800; }
    .ai-cursor { @apply bg-cyan-50 text-cyan-800 border-cyan-200 dark:bg-cyan-900/25 dark:text-cyan-300 dark:border-cyan-800; }
    .ai-human { @apply bg-slate-100 text-slate-600 border-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700; }
    .ai-pill { @apply inline-flex items-center gap-1 px-2 py-0.5 rounded-md border text-xs font-semibold whitespace-nowrap shrink-0; }
    .tier-badge { @apply text-[10px] leading-none px-1.5 py-0.5 rounded font-bold whitespace-nowrap; }
    .tier-budget { @apply bg-emerald-500/15 text-emerald-700 dark:text-emerald-400; }
    .tier-required { @apply bg-red-500/15 text-red-700 dark:text-red-400; }
    .tier-context { @apply bg-cyan-500/15 text-cyan-700 dark:text-cyan-400; }
    .tier-human { @apply bg-slate-500/15 text-slate-600 dark:text-slate-400; }
    .dot-bullet { @apply w-1.5 h-1.5 rounded-full bg-orange-400 mt-[0.45rem] flex-shrink-0; }
    .mermaid-wrap { @apply bg-white dark:bg-slate-900/80 rounded-xl border border-slate-200 dark:border-slate-700 p-6 md:p-10; }
    .mermaid-wrap .mermaid { @apply flex justify-center min-w-[36rem]; }
    .mermaid-wrap svg { max-width: 100%; height: auto; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">

  <nav class="sticky top-0 z-50 backdrop-blur-md bg-white/90 dark:bg-slate-950/90 border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <span class="text-sm font-semibold text-blue-600 dark:text-blue-400" data-i18n="footer.text"></span>
      <div class="flex items-center gap-2">
        <button id="theme-toggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800" aria-label="Theme">
          <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        <div class="flex gap-1 bg-slate-100 dark:bg-slate-800 rounded-lg p-1">
          <button data-locale="zh-tw" class="locale-btn px-2 py-1 text-xs rounded-md">繁中</button>
          <button data-locale="en" class="locale-btn px-2 py-1 text-xs rounded-md">EN</button>
          <button data-locale="ja" class="locale-btn px-2 py-1 text-xs rounded-md">日本語</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-4 py-10 flex gap-8">
    <!-- TOC sidebar -->
    <aside class="hidden lg:block w-44 flex-shrink-0">
      <nav id="toc-nav" class="sticky top-20 space-y-1 text-sm text-slate-500 dark:text-slate-400"></nav>
    </aside>

    <main class="flex-1 min-w-0 space-y-20 pb-16">

      <!-- Hero -->
      <header class="space-y-4">
        <h1 class="text-3xl sm:text-4xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent" data-i18n="hero.title"></h1>
        <p class="text-lg text-slate-600 dark:text-slate-400 leading-relaxed" data-i18n="hero.subtitle"></p>
      </header>

      <!-- Problems -->
      <section id="problems" class="space-y-4">
        <h2 class="text-2xl font-bold border-b border-slate-200 dark:border-slate-800 pb-2" data-i18n="problems.heading"></h2>
        <div id="problems-content" class="space-y-4"></div>
      </section>

      <!-- Vision side by side -->
      <section id="vision" class="space-y-4">
        <h2 class="text-2xl font-bold border-b border-slate-200 dark:border-slate-800 pb-2" data-i18n="vision.heading"></h2>
        <div class="grid md:grid-cols-2 gap-4">
          <div class="section-card border-red-200 dark:border-red-900/50">
            <h3 class="font-bold text-red-600 dark:text-red-400 mb-3" data-i18n="vision.as_is_title"></h3>
            <ul id="vision-as-is" class="space-y-2 text-sm"></ul>
          </div>
          <div class="section-card border-emerald-200 dark:border-emerald-900/50">
            <h3 class="font-bold text-emerald-600 dark:text-emerald-400 mb-3" data-i18n="vision.to_be_title"></h3>
            <ul id="vision-to-be" class="space-y-2 text-sm"></ul>
          </div>
        </div>
      </section>

      <!-- Roles detailed -->
      <section id="roles" class="space-y-4">
        <h2 class="text-2xl font-bold" data-i18n="roles.heading"></h2>
        <p class="text-slate-600 dark:text-slate-400" data-i18n="roles.subheading"></p>
        <div id="roles-content" class="space-y-4"></div>
      </section>

      <!-- Doc flow mermaid -->
      <section id="docflow" class="space-y-4">
        <h2 class="text-2xl font-bold" data-i18n="docflow.heading"></h2>
        <p class="text-slate-600 dark:text-slate-400 text-sm" data-i18n="docflow.subheading"></p>
        <div id="docflow-wrap"></div>
      </section>

      <!-- Doc structure -->
      <section id="docstructure" class="space-y-4">
        <h2 class="text-2xl font-bold" data-i18n="docstructure.heading"></h2>
        <div id="doc-tree-wrap"></div>
      </section>

      <!-- Survey priority -->
      <section id="survey" class="space-y-4">
        <h2 class="text-2xl font-bold" data-i18n="survey.heading"></h2>
        <div id="survey-content" class="space-y-4"></div>
      </section>

      <!-- Freeze -->
      <section id="freeze" class="space-y-4">
        <h2 class="text-2xl font-bold" data-i18n="freeze.heading"></h2>
        <div class="grid md:grid-cols-2 gap-4">
          <div class="section-card">
            <h3 class="font-bold text-blue-600 dark:text-blue-400 mb-3" data-i18n="freeze.phase1_title"></h3>
            <ul id="freeze-p1" class="space-y-2 text-sm text-slate-600 dark:text-slate-400"></ul>
          </div>
          <div class="section-card">
            <h3 class="font-bold text-indigo-600 dark:text-indigo-400 mb-3" data-i18n="freeze.phase2_title"></h3>
            <ul id="freeze-p2" class="space-y-2 text-sm text-slate-600 dark:text-slate-400"></ul>
          </div>
        </div>
      </section>

      <!-- Figma -->
      <section id="figma" class="space-y-6">
        <h2 class="text-2xl font-bold" data-i18n="figma.heading"></h2>
        <p class="text-sm text-amber-700 dark:text-amber-300 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 p-3 rounded-lg" data-i18n="figma.variables_note"></p>
        <div id="figma-sections" class="space-y-3"></div>
      </section>

      <!-- i18n prep -->
      <section id="i18n" class="space-y-4">
        <h2 class="text-2xl font-bold" data-i18n="i18n_prep.heading"></h2>
        <p class="text-sm text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20 p-3 rounded-lg" data-i18n="i18n_prep.note"></p>
        <div id="i18n-steps"></div>
      </section>

      <!-- Dev workflow -->
      <section id="dev" class="space-y-4">
        <h2 class="text-2xl font-bold" data-i18n="dev.heading"></h2>
        <p class="text-slate-600 dark:text-slate-400" data-i18n="dev.subheading"></p>
        <p class="text-sm"><span data-i18n="dev.ref_label"></span>: <a id="dev-ref" href="#" target="_blank" class="text-blue-600 dark:text-blue-400 underline"></a></p>
        <p class="text-sm text-slate-500 dark:text-slate-400 flex flex-wrap gap-x-4 gap-y-1" id="dev-legend"></p>
        <div class="grid md:grid-cols-2 gap-4">
          <div class="section-card border-orange-200 dark:border-orange-900/50">
            <h3 class="font-bold text-orange-600 dark:text-orange-400 mb-2" data-i18n="dev.claude_title"></h3>
            <p class="text-sm text-slate-600 dark:text-slate-400" data-i18n="dev.claude_desc"></p>
          </div>
          <div class="section-card border-cyan-200 dark:border-cyan-900/50">
            <h3 class="font-bold text-cyan-600 dark:text-cyan-400 mb-2" data-i18n="dev.cursor_title"></h3>
            <p class="text-sm text-slate-600 dark:text-slate-400" data-i18n="dev.cursor_desc"></p>
          </div>
        </div>
        <div id="dev-skills" class="overflow-x-auto"></div>
      </section>

      <!-- Pipeline issues -->
      <section id="pipeline" class="space-y-4">
        <h2 class="text-2xl font-bold" data-i18n="pipeline.heading"></h2>
        <p class="text-sm text-slate-600 dark:text-slate-400" data-i18n="pipeline.subheading"></p>
        <div id="pipeline-steps" class="flex flex-wrap gap-2 justify-center py-4"></div>
        <div id="issues-content" class="grid sm:grid-cols-3 gap-4"></div>
      </section>

      <!-- Roadmap -->
      <section id="roadmap" class="space-y-4">
        <h2 class="text-2xl font-bold" data-i18n="roadmap.heading"></h2>
        <div id="roadmap-content" class="space-y-6"></div>
      </section>

    </main>
  </div>

  <footer class="border-t border-slate-200 dark:border-slate-800 py-6 text-center text-sm text-slate-500">
    <span data-i18n="footer.text"></span>
  </footer>

  <script src="i18n/embed.js"></script>
  <script>
    let currentLocale = localStorage.getItem('demo-locale') || 'zh-tw';
    let translations = {};

    function t(key, loc = currentLocale) {
      const parts = key.split('.');
      let obj = translations[loc];
      for (const p of parts) { if (!obj) return key; obj = obj[p]; }
      return obj ?? key;
    }

    async function loadTranslations() {
      if (window.__I18N_EMBEDDED__) { translations = window.__I18N_EMBEDDED__; return; }
      for (const loc of ['zh-tw','en','ja']) {
        try {
          const res = await fetch(`i18n/${loc}.json`);
          if (res.ok) translations[loc] = await res.json();
        } catch (_) {}
      }
    }

    function li(items) {
      return items.map(i => `<li class="flex gap-2.5 items-start"><span class="dot-bullet"></span><span>${i}</span></li>`).join('');
    }

    function aiTag(rec, opts = {}) {
      if (!rec) return '';
      const { compact = false } = opts;
      const toolCls = { claude: 'ai-claude', cursor: 'ai-cursor', human: 'ai-human' };
      const tierLabel = rec.tier === 'human' ? '' : (t(`common.tier_${rec.tier}`) || '');
      const toolLabel = t(`common.tool_${rec.tool}`) || rec.tool;
      const title = [toolLabel, rec.model, tierLabel, rec.hint].filter(Boolean).join(' · ');

      if (rec.tool === 'human') {
        return `<span class="ai-pill ai-human whitespace-nowrap" title="${rec.hint || ''}">${toolLabel}</span>`;
      }

      if (compact) {
        const dot = { claude: 'bg-orange-400', cursor: 'bg-cyan-400' }[rec.tool] || 'bg-slate-400';
        return `<span class="inline-flex items-center gap-1 text-[10px] text-slate-500 dark:text-slate-400 whitespace-nowrap" title="${title}">
          <span class="w-1.5 h-1.5 rounded-full ${dot}"></span>
          <span>${rec.model || toolLabel}</span>
          ${tierLabel ? `<span class="tier-badge tier-${rec.tier}">${tierLabel}</span>` : ''}
        </span>`;
      }

      const model = rec.model
        ? `<span class="font-normal opacity-75"><span class="opacity-50 mx-0.5">·</span>${rec.model}</span>`
        : '';
      const pill = `<span class="ai-pill ${toolCls[rec.tool] || 'ai-human'} whitespace-nowrap" title="${rec.hint || ''}">
        <span>${toolLabel}</span>${model}
      </span>`;
      const tier = tierLabel ? `<span class="tier-badge tier-${rec.tier}">${tierLabel}</span>` : '';
      return `<span class="inline-flex items-center gap-1.5 whitespace-nowrap">${pill}${tier}</span>`;
    }

    function aiHint(rec) {
      return rec?.hint ? `<p class="text-xs text-slate-500 dark:text-slate-400 mt-1">${rec.hint}</p>` : '';
    }

    function fold(summary, content, open = false) {
      return `<details class="fold section-card" ${open ? 'open' : ''}>
        <summary class="cursor-pointer text-sm font-semibold text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 flex items-center gap-2">
          <svg class="fold-chevron w-3.5 h-3.5 transition-transform flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M6 4l8 6-8 6V4z"/></svg>
          ${summary}
        </summary>
        <div class="mt-3 pt-3 border-t border-slate-100 dark:border-slate-800">${content}</div>
      </details>`;
    }

    function renderAll() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const v = t(el.getAttribute('data-i18n'));
        if (typeof v === 'string') el.textContent = v;
      });
      document.title = t('meta.title');
      document.documentElement.lang = currentLocale === 'zh-tw' ? 'zh-TW' : currentLocale;

      // TOC
      document.getElementById('toc-nav').innerHTML = t('toc').map(item =>
        `<a href="#${item.id}" class="toc-link block py-1 hover:text-blue-600">${item.label}</a>`
      ).join('');

      // Problems
      document.getElementById('problems-content').innerHTML = t('problems.groups').map(g => `
        <div class="section-card">
          <h3 class="font-bold mb-2">${g.title}</h3>
          <ul class="space-y-1 text-sm text-slate-600 dark:text-slate-400">${li(g.items)}</ul>
        </div>`).join('');

      // Vision
      document.getElementById('vision-as-is').innerHTML = li(t('vision.as_is_items'));
      document.getElementById('vision-to-be').innerHTML = li(t('vision.to_be_items'));

      // Roles
      document.getElementById('roles-content').innerHTML = t('roles.cards').map(c => `
        <div class="section-card">
          <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-2 mb-1">
            <h3 class="font-bold text-lg">${c.title}</h3>
            <div class="shrink-0">${aiTag(c.ai_recommendation)}</div>
          </div>
          ${aiHint(c.ai_recommendation)}
          <p class="text-sm mb-1 mt-2">${c.task}</p>
          ${fold(t('common.fold_iof'), `
            <div class="grid sm:grid-cols-3 gap-3 text-xs">
              <div><span class="font-semibold text-slate-500">${t('common.label_input')}</span><ul class="mt-1 space-y-1 text-slate-600 dark:text-slate-400">${li(c.inputs)}</ul></div>
              <div><span class="font-semibold text-slate-500">${t('common.label_output')}</span><p class="mt-1 font-mono text-blue-600 dark:text-blue-400 break-all">${c.output}</p></div>
              <div><span class="font-semibold text-slate-500">${t('common.label_format')}</span><ul class="mt-1 space-y-1 text-slate-600 dark:text-slate-400">${li(c.format)}</ul></div>
            </div>`)}
        </div>`).join('');

      // Doc flow (folded mermaid)
      document.getElementById('docflow-wrap').innerHTML = fold(
        t('common.fold_docflow'),
        `<div class="mermaid-wrap overflow-x-auto"><pre class="mermaid">${t('docflow.diagram')}</pre></div>`
      );
      document.getElementById('doc-tree-wrap').innerHTML = fold(
        t('common.fold_output_tree'),
        `<pre class="tree">${t('docstructure.tree')}</pre>`
      );

      // Survey
      document.getElementById('survey-content').innerHTML = t('survey.categories').map(c => `
        <div class="section-card">
          <div class="flex flex-wrap items-center gap-2 mb-2">
            <h3 class="font-bold">${c.title}</h3>
            <span class="text-xs px-2 py-0.5 rounded bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 whitespace-nowrap shrink-0">${c.priority}</span>
          </div>
          <div class="mb-2">${c.ai_recommendation ? aiTag(c.ai_recommendation) : ''}</div>
          <ul class="text-sm">${li(c.items)}</ul>
          ${fold(t('common.fold_note'), `<p class="text-xs text-slate-500 dark:text-slate-400">${c.note}</p>`)}
        </div>`).join('');

      // Freeze
      document.getElementById('freeze-p1').innerHTML = li(t('freeze.phase1_items'));
      document.getElementById('freeze-p2').innerHTML = li(t('freeze.phase2_items'));

      // Figma sections (folded)
      const figmaTiers = t('figma.tiers').map(tier => {
        const border = tier.locked ? 'border-red-200 dark:border-red-900/50 bg-red-50/30 dark:bg-red-950/20' : 'border-emerald-300 dark:border-emerald-800 bg-emerald-50/30 dark:bg-emerald-950/20';
        return `<div class="section-card ${border} grid sm:grid-cols-4 gap-2 text-sm items-center">
          <span class="font-bold">${tier.layer}</span>
          <span class="font-mono text-xs">${tier.example}</span>
          <span class="font-mono text-xs text-slate-500">${tier.css}</span>
          <span class="font-semibold">${tier.access}</span>
        </div>`;
      }).join('');
      document.getElementById('figma-sections').innerHTML = [
        fold(t('figma.org_heading'), `<div class="space-y-2 text-sm">
          <p class="text-slate-600 dark:text-slate-400">${t('figma.org_desc')}</p>
          <p class="font-mono bg-slate-100 dark:bg-slate-800 p-3 rounded-lg">${t('figma.org_central')}</p>
          <p class="font-mono bg-slate-100 dark:bg-slate-800 p-3 rounded-lg">${t('figma.org_local')}</p>
        </div>`),
        fold(t('figma.pattern_heading'), `<div class="space-y-2 text-sm">
          <p>${t('figma.pattern_central')}</p>
          <p>${t('figma.pattern_local')}</p>
        </div>`),
        fold(t('figma.token_heading'), `<p class="text-sm text-slate-600 dark:text-slate-400 mb-3">${t('figma.token_subheading')}</p><div class="space-y-2">${figmaTiers}</div>`),
        fold(t('figma.align_heading'), `<div class="space-y-2 text-sm">
          <p class="text-slate-600 dark:text-slate-400">${t('figma.align_desc')}</p>
          <p class="font-mono bg-amber-50 dark:bg-amber-900/20 text-amber-800 dark:text-amber-200 p-3 rounded-lg">${t('figma.align_example')}</p>
        </div>`),
      ].join('');

      // i18n steps (folded)
      const i18nSteps = t('i18n_prep.steps');
      document.getElementById('i18n-steps').innerHTML = fold(
        t('common.fold_steps').replace('{n}', i18nSteps.length),
        `<ol class="space-y-3 text-sm text-slate-700 dark:text-slate-300">${i18nSteps.map((s, i) => {
          const step = (t('i18n_prep.step_details') || [])[i];
          const tag = step?.ai_recommendation ? `<span class="ml-2 align-middle">${aiTag(step.ai_recommendation)}</span>` : '';
          return `<li class="py-1"><span>${s}${tag}</span>${aiHint(step?.ai_recommendation)}</li>`;
        }).join('')}</ol>`
      );

      // Dev ref
      const ref = document.getElementById('dev-ref');
      ref.href = t('dev.ref_url');
      ref.textContent = t('dev.ref_url');

      // Dev legend
      document.getElementById('dev-legend').innerHTML = [
        t('common.tier_budget'), t('common.tier_required'), t('common.tier_context'), t('common.tier_human')
      ].map((label, i) => {
        const keys = ['budget', 'required', 'context', 'human'];
        return `<span class="inline-flex items-center gap-1"><span class="tier-badge tier-${keys[i]}">${label}</span><span>${t(`common.tier_${keys[i]}_desc`)}</span></span>`;
      }).join('');

      // Dev skills table (folded)
      const skills = t('dev.skills');
      document.getElementById('dev-skills').innerHTML = fold(t('common.fold_skills_table'), `
        <table class="w-full text-sm">
          <thead><tr class="text-left text-slate-500 border-b border-slate-200 dark:border-slate-700">
            <th class="pb-2 pr-4">${t('dev.table_skill')}</th><th class="pb-2 pr-4">${t('dev.table_desc')}</th><th class="pb-2 pr-4">${t('dev.table_ai')}</th><th class="pb-2">${t('dev.table_phase')}</th>
          </tr></thead>
          <tbody>${skills.map(s => `
            <tr class="border-b border-slate-100 dark:border-slate-800">
              <td class="py-3 pr-4 font-mono font-bold text-blue-600 dark:text-blue-400">${s.name}</td>
              <td class="py-3 pr-4 text-slate-600 dark:text-slate-400">${s.desc}</td>
              <td class="py-3 pr-4"><div>${aiTag(s.ai_recommendation)}</div>${aiHint(s.ai_recommendation)}</td>
              <td class="py-3">${s.phase}</td>
            </tr>`).join('')}
          </tbody>
        </table>`);

      // Pipeline steps (wider cards, compact tags)
      const devSkills = t('dev.skills');
      document.getElementById('pipeline-steps').innerHTML = `<div class="flex gap-2 overflow-x-auto pb-1">${devSkills.map((s, i) => `
        <div class="flex items-center gap-1 flex-shrink-0">
          <div class="section-card text-center px-3 py-2 min-w-[7.5rem]">
            <div class="w-7 h-7 mx-auto rounded-full bg-blue-600 text-white text-xs flex items-center justify-center font-bold">${i+1}</div>
            <p class="text-xs mt-2 font-medium leading-tight">${s.name}</p>
            <div class="mt-1.5 flex justify-center">${aiTag(s.ai_recommendation, { compact: true })}</div>
          </div>
          ${i < devSkills.length - 1 ? '<span class="text-slate-300 dark:text-slate-600 self-center">→</span>' : ''}
        </div>`).join('')}</div>`;

      // Issues always visible
      const tagCls = { Schema: 'tag-schema', UI: 'tag-ui', BDD: 'tag-bdd' };
      document.getElementById('issues-content').innerHTML = t('pipeline.mock_issues').map(issue => `
        <div class="section-card">
          <div class="flex gap-2 mb-2 items-center">
            <span class="text-xs font-mono text-slate-400">${issue.id}</span>
            <span class="text-xs px-2 py-0.5 rounded font-semibold whitespace-nowrap ${tagCls[issue.tag] || ''}">【${issue.tag}】</span>
          </div>
          <div class="mb-2">${aiTag(issue.ai_recommendation)}</div>
          <p class="text-sm font-medium mb-1">${issue.title}</p>
          ${aiHint(issue.ai_recommendation)}
          <p class="text-xs text-slate-500 mt-1">${issue.blocks}</p>
        </div>`).join('');

      // Roadmap
      document.getElementById('roadmap-content').innerHTML = t('roadmap.phases').map((p, i) => `
        <div class="flex gap-4">
          <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-bold flex-shrink-0">${i+1}</div>
          <div class="section-card flex-1">
            <h3 class="font-bold text-lg">${p.title}</h3>
            <div class="mt-1.5">${aiTag(p.ai_recommendation)}</div>
            ${aiHint(p.ai_recommendation)}
            <p class="text-sm text-slate-600 dark:text-slate-400 mt-2">${p.description}</p>
            ${p.risk ? `<p class="text-sm mt-2 px-3 py-2 bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-300 rounded-lg">${p.risk}</p>` : ''}
            ${(p.deliverables || []).length ? fold(t('common.fold_deliverables'), `
              <div class="flex flex-wrap gap-2">${p.deliverables.map(d => `<span class="text-xs px-2 py-1 bg-slate-100 dark:bg-slate-800 rounded">${d}</span>`).join('')}</div>`) : ''}
          </div>
        </div>`).join('');

      // Locale buttons
      document.querySelectorAll('.locale-btn').forEach(btn => {
        const active = btn.dataset.locale === currentLocale;
        btn.className = `locale-btn px-2 py-1 text-xs rounded-md ${active ? 'bg-white dark:bg-slate-700 text-blue-600 shadow-sm' : 'text-slate-500'}`;
      });

      // Re-render mermaid (defer if inside closed <details>)
      document.querySelectorAll('.mermaid').forEach(mm => {
        if (mm.dataset.processed) return;
        const details = mm.closest('details');
        if (details && !details.open) return;
        mermaid.run({ nodes: [mm] }).then(() => { mm.dataset.processed = '1'; });
      });
    }

    function setLocale(loc) {
      currentLocale = loc;
      localStorage.setItem('demo-locale', loc);
      renderAll();
    }

    document.addEventListener('toggle', (e) => {
      if (e.target.tagName !== 'DETAILS' || !e.target.open) return;
      e.target.querySelectorAll('.mermaid:not([data-processed])').forEach(mm => {
        mermaid.run({ nodes: [mm] }).then(() => { mm.dataset.processed = '1'; });
      });
    }, true);

    document.querySelectorAll('.locale-btn').forEach(b => b.addEventListener('click', () => setLocale(b.dataset.locale)));
    document.getElementById('theme-toggle').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('demo-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
      initMermaid();
      document.querySelectorAll('.mermaid').forEach(mm => { mm.removeAttribute('data-processed'); });
      renderAll();
    });

    if (localStorage.getItem('demo-theme') === 'dark' || (!localStorage.getItem('demo-theme') && matchMedia('(prefers-color-scheme: dark)').matches))
      document.documentElement.classList.add('dark');

    loadTranslations().then(renderAll);
  </script>
</body>
</html>
