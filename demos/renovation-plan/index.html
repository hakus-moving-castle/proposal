          securityLevel: 'loose',
          look: 'classic',
          theme: 'base',
          themeVariables: dark ? {
            primaryColor: '#1e293b', primaryTextColor: '#F9FAFB', primaryBorderColor: '#10B981',

            primaryColor: '#ffffff', primaryTextColor: '#111827', primaryBorderColor: '#10B981',
            secondaryColor: '#f1f5f9', secondaryTextColor: '#111827', secondaryBorderColor: '#6366F1',
            tertiaryColor: '#e2e8f0', tertiaryTextColor: '#111827', tertiaryBorderColor: '#3B82F6',
            lineColor: '#64748b', textColor: '#111827', mainBkg: '#ffffff',
            nodeBorder: '#059669', clusterBkg: '#f8fafc', titleColor: '#111827',
            edgeLabelBackground: '#ffffff', fontFamily: 'ui-sans-serif, system-ui, sans-serif', fontSize: '14px',

        --accent-amber-bg: rgba(245, 158, 11, 0.12);

    <script src="i18n/embed.js"></script>
    <script>
      let currentLocale = localStorage.getItem("demo-locale") || "zh-tw";
      let translations = {};

      function t(key, loc = currentLocale) {
        const parts = key.split(".");
        let obj = translations[loc];
        for (const p of parts) {
          if (!obj) return key;
          obj = obj[p];
        }
        return obj ?? key;
      }

      function tk(section, field) {
        return t(`${section}.${field}`);
      }

      async function loadTranslations() {
        if (window.__I18N_EMBEDDED__) {
          translations = window.__I18N_EMBEDDED__;
          return;
        }
        for (const loc of ["zh-tw", "en", "ja", "ko"]) {
          try {
            const res = await fetch(`i18n/${loc}.json`);
            if (res.ok) translations[loc] = await res.json();
          } catch (_) {}
        }
      }

      function esc(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function termHint(key, display) {
        const g = t(`common.glossary.${key}`);
        const label = display || key;
        if (!g || typeof g !== "object" || !g.tip) {
          return `<strong>${esc(label)}</strong>`;
        }
        return `<span class="term-hint" tabindex="0"><abbr title="">${esc(label)}</abbr><span class="term-tip" role="tooltip">${esc(g.tip)}</span></span>`;
      }

      const CIRCLED_NUM = { "①": "1", "②": "2", "③": "3", "④": "4" };

      function richText(text) {
        let str = String(text);
        str = str.replace(/L1 \+ L2 \+ L3/g, "__COMPOUND_L123__");
        str = str.replace(/L1\/L2\/L3/g, "__COMPOUND_L123__");
        str = str.replace(/L1\/L2/g, "__COMPOUND_L12__");
        str = str.replace(/L2 \+ L3/g, "__COMPOUND_L23__");
        str = str.replace(/L2\/L3/g, "__COMPOUND_L23__");

        const glossary = t("common.glossary") || {};
        const glossaryKeys = Object.keys(glossary).sort((a, b) => b.length - a.length);
        const glossaryPart = glossaryKeys.length
          ? `|${glossaryKeys.map((k) => k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|")}`
          : "";
        const re = new RegExp(
          `(__COMPOUND_L123__|__COMPOUND_L12__|__COMPOUND_L23__|\\bL[123]\\b${glossaryPart}|（見 s\\d+[^）]*）|\\(see s\\d+[^)]*\\)|（s\\d+[^）]*(?:参照|참조)）|\\(s\\d+[^)]*(?:参照|참조)\\)|s\\d [①②③④])`,
          "g",
        );
        let html = "";
        let last = 0;
        let m;
        while ((m = re.exec(str))) {
          if (m.index > last) html += esc(str.slice(last, m.index));
          const tok = m[0];
          if (tok === "__COMPOUND_L123__")
            html += `${termHint("L1")} + ${termHint("L2")} + ${termHint("L3")}`;
          else if (tok === "__COMPOUND_L12__") html += `${termHint("L1")}/${termHint("L2")}`;
          else if (tok === "__COMPOUND_L23__") html += `${termHint("L2")} + ${termHint("L3")}`;
          else if (/^L[123]$/.test(tok)) html += termHint(tok);
          else if (glossary[tok]) html += termHint(tok, tok);
          else if (
            /^（見 s(\d+)/.test(tok) ||
            /^\(see s(\d+)/i.test(tok) ||
            /^（s(\d+)/.test(tok) ||
            /^\(s(\d+)/.test(tok)
          ) {
            const sec = tok.match(/s(\d+)/i)[1];
            let anchor = `#s${sec}`;
            if (sec === "3") anchor = "#s3-audit-layers";
            else if (sec === "7" && /換行|newline|改行|줄바꿈/i.test(tok)) anchor = "#s7-newline";
            const label = tok
              .replace(/^[（(]見 /, "")
              .replace(/^[（(]see /i, "")
              .replace(/^[（(]/, "")
              .replace(/[）)]$/, "");
            const open = tok.startsWith("(") ? "(" : "（";
            const close = tok.endsWith(")") ? ")" : "）";
            html += `${open}<a href="${anchor}" class="xref-link">${esc(label)}</a>${close}`;
          } else if (/^s(\d) ([①②③④])$/.test(tok)) {
            const [, sec, step] = tok.match(/^s(\d) ([①②③④])$/);
            html += `<a href="#s${sec}-step-${CIRCLED_NUM[step]}" class="xref-link">${esc(tok)}</a>`;
          }
          last = m.index + tok.length;
        }
        if (last < str.length) html += esc(str.slice(last));
        return html;
      }

        if (

        const sections = (content.match(/<div class="mb-4">/g) || []).length;
        const paragraphs = (content.match(/<p[ >]/g) || []).length;
        return sections <= 1 && paragraphs <= 1;

          (r) => `<tr><td>${esc(r.type)}</td><td>${esc(r.requirement)}</td></tr>`,
        );
        const tagCls = { Schema: "tag-schema", UI: "tag-ui", BDD: "tag-bdd" };
        const issues = t(`${s}.issues`)
          .map(
            (issue) => `
        <div class="section-card issue-card">
          <div class="flex gap-2 mb-2 items-center">
            <span class="text-xs font-mono" style="color: var(--text-muted)">${issue.id}</span>
            <span class="badge ${tagCls[issue.tag] || ""}">【${issue.tag}】</span>
          </div>
          <p class="text-sm font-medium">${esc(issue.title)}</p>
          <p class="text-xs mt-2" style="color: var(--text-muted)">${esc(issue.blocks)}</p>
        </div>`,
          )
          .join("");
        const roadmap = t(`${s}.roadmap`)
          .map(
            (p, i) => `
        <div class="flex gap-4">
          <div class="roadmap-step">${i + 1}</div>
          <div class="section-card flex-1" style="padding: 1.5rem">
            <h4 class="font-bold">${esc(p.title)}</h4>
            <p class="text-sm mt-2 leading-relaxed" style="color: var(--text-secondary)">${richText(p.desc)}</p>
            ${p.risk ? `<p class="text-sm mt-3 callout-amber rounded-lg">${richText(p.risk)}</p>` : ""}
          </div>
        </div>`,
          )
          .join("");
        const refs = t(`${s}.refs`)
          .map(
            (r) =>
              `<a href="${r.url}" target="_blank" class="text-sm underline" style="color: var(--accent-blue)">${esc(r.label)}</a>`,
          )
          .join(" · ");
        document.getElementById("s8").innerHTML = `
        ${sectionTitle(s)}
        <h3 class="font-bold mb-3">${tk(s, "validation_heading")}</h3>
        <ul class="space-y-2 mb-6">${li(t(`${s}.validation_items`), true)}</ul>
        <h3 class="font-bold mt-8 mb-4">${tk(s, "gate_heading")}</h3>
        <h4 class="font-semibold mb-2">${tk(s, "gate_project_heading")}</h4>
        <ul class="space-y-2 mb-6">${li(t(`${s}.gate_project_items`), true)}</ul>
        <h4 class="font-semibold mb-2">${tk(s, "gate_issue_heading")}</h4>
        ${gateIssueTable}
        <h4 class="font-semibold mt-6 mb-2">${tk(s, "gate_merge_heading")}</h4>
        <ul class="space-y-2 mb-6">${li(t(`${s}.gate_merge_items`), true)}</ul>
        <h3 class="font-bold mt-8 mb-2">${tk(s, "log_rule_heading")}</h3>
        ${renderCallout("amber", tk(s, "log_rule"), true)}
        <ul class="space-y-2 mt-3 mb-6">${li(t(`${s}.log_rule_items`))}</ul>
        <h3 class="font-bold mt-8 mb-2">${tk(s, "skills_heading")}</h3>
        <p class="text-sm mb-4 leading-relaxed" style="color: var(--text-secondary)">${tk(s, "skills_subheading")}</p>
        ${skillsTable}
        <h3 class="font-bold mt-8 mb-3">${tk(s, "refs_heading")}</h3>
        <p>${refs}</p>
        <h3 class="font-bold mt-8 mb-3">${tk(s, "issues_heading")}</h3>
        ${renderIssueLegend()}
        <div class="grid sm:grid-cols-3 gap-4 mt-4">${issues}</div>
        <h3 class="font-bold mt-8 mb-4">${tk(s, "roadmap_heading")}</h3>
        <p class="text-sm leading-relaxed mb-4" style="color: var(--text-secondary)">${richText(tk(s, "roadmap_note"))}</p>
        <div class="space-y-4">${roadmap}</div>
      `;
      }

      function renderS9() {
        const s = "s9";
        const layersTable = renderSpecTable(
          t(`${s}.layers_cols`),
          t(`${s}.layers_rows`),
          (r) =>
            `<tr><td>${esc(r.layer)}</td><td>${esc(r.role)}</td><td><code>${esc(r.artifact)}</code></td></tr>`,
        );
        const errorTable = renderSpecTable(
          t(`${s}.error_cols`),
          t(`${s}.error_rows`),
          (r) =>
            `<tr><td><code>${esc(r.type)}</code></td><td>${esc(r.trigger)}</td><td>${esc(r.handling)}</td></tr>`,
        );
        document.getElementById("s9").innerHTML = `
        ${sectionTitle(s)}
        <p class="text-sm leading-relaxed" style="color: var(--text-secondary)">${richText(tk(s, "subheading"))}</p>
        ${renderCallout("emerald", tk(s, "decision_callout"), true)}
        <h3 class="font-bold mt-8 mb-3">${tk(s, "layers_heading")}</h3>
        <p class="disambig-note">${esc(t("common.s9_layers_note"))}</p>
        ${layersTable}
        <h3 class="font-bold mt-8 mb-2">${tk(s, "runtime_heading")}</h3>
        <ul class="space-y-2 mb-6">${li(t(`${s}.runtime_steps`))}</ul>
        <h3 class="font-bold mt-6 mb-3">${tk(s, "error_heading")}</h3>
        ${errorTable}
        <h3 class="font-bold mt-8 mb-2">${tk(s, "proto_heading")}</h3>
        <p class="text-sm leading-relaxed mb-3" style="color: var(--text-secondary)">${tk(s, "proto_intro")}</p>
        <ul class="space-y-2 mb-4">${li(t(`${s}.proto_structure`))}</ul>
        <h4 class="font-semibold mb-2">${tk(s, "proto_pause_heading")}</h4>
        <ul class="space-y-2 mb-6">${li(t(`${s}.proto_pause_items`))}</ul>
        <h3 class="font-bold mt-6 mb-2">${tk(s, "plan_bridge_heading")}</h3>
        <ul class="space-y-2 mb-6">${li(t(`${s}.plan_bridge_items`))}</ul>
        ${renderCallout("amber", tk(s, "bff_note"))}
      `;
      }

      function renderMermaid() {
        document.querySelectorAll(".mermaid").forEach((mm) => {
          if (mm.dataset.processed) return;
          const details = mm.closest("details");
          if (details && !details.open) return;
          mermaid.run({ nodes: [mm] }).then(() => {
            mm.dataset.processed = "1";
          });
        });
      }

      function setupScrollSpy() {
        const links = document.querySelectorAll(".toc-link");
        const sections = [...links]
          .map((l) => document.getElementById(l.getAttribute("href").slice(1)))
          .filter(Boolean);
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                links.forEach((l) =>
                  l.classList.toggle("active", l.getAttribute("href") === `#${entry.target.id}`),
                );
              }
            });
          },
          { rootMargin: "-20% 0px -60% 0px" },
        );
        sections.forEach((s) => observer.observe(s));
      }

      function renderAll() {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const v = t(el.getAttribute("data-i18n"));
          if (typeof v === "string") el.textContent = v;
        });
        document.title = t("meta.title");
        const langMap = { "zh-tw": "zh-TW", en: "en", ja: "ja", ko: "ko" };
        document.documentElement.lang = langMap[currentLocale] || currentLocale;

        document.getElementById("toc-nav").innerHTML = t("toc")
          .map((item) => `<a href="#${item.id}" class="toc-link">${esc(item.label)}</a>`)
          .join("");

        renderS1();
        renderS2();
        renderS3();
        renderS4();
        renderS5();
        renderS6();
        renderS7();
        renderS8();
        renderS9();

        document.querySelectorAll(".locale-btn").forEach((btn) => {
          const active = btn.dataset.locale === currentLocale;
          btn.style.background = active ? "var(--bg-card)" : "transparent";
          btn.style.color = active ? "var(--accent-emerald)" : "var(--text-muted)";
          btn.style.boxShadow = active ? "0 1px 2px rgba(0,0,0,0.1)" : "none";
        });

        document.querySelectorAll(".mermaid").forEach((mm) => mm.removeAttribute("data-processed"));
        renderMermaid();
        setupScrollSpy();
      }

      function setLocale(loc) {
        currentLocale = loc;
        localStorage.setItem("demo-locale", loc);
        renderAll();
      }

      document.addEventListener(
        "toggle",
        (e) => {
          if (e.target.tagName !== "DETAILS" || !e.target.open) return;
          e.target.querySelectorAll(".mermaid:not([data-processed])").forEach((mm) => {
            mermaid.run({ nodes: [mm] }).then(() => {
              mm.dataset.processed = "1";
            });
          });
        },
        true,
      );

      document
        .querySelectorAll(".locale-btn")
        .forEach((b) => b.addEventListener("click", () => setLocale(b.dataset.locale)));
      document.getElementById("theme-toggle").addEventListener("click", () => {
        document.documentElement.classList.toggle("dark");
        localStorage.setItem(
          "demo-theme",
          document.documentElement.classList.contains("dark") ? "dark" : "light",
        );
        initMermaid();
        document.querySelectorAll(".mermaid").forEach((mm) => mm.removeAttribute("data-processed"));
        renderMermaid();
      });

      if (localStorage.getItem("demo-theme") === "light") {
        document.documentElement.classList.remove("dark");
      } else {
        document.documentElement.classList.add("dark");
      }

      loadTranslations().then(renderAll);
    </script>
  </body>
</html>
