<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>專案全面翻新</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { primary: '#3b82f6', secondary: '#6366f1' }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes checkPop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); }
    }
    .animate-fade-slide-up { animation: fadeSlideUp 0.4s ease-out forwards; }
    .animate-check-pop { animation: checkPop 0.5s ease-out forwards; }
    .issue-card { opacity: 0; transform: translateY(16px); }
    .issue-card.show { opacity: 1; transform: translateY(0); transition: all 0.35s ease-out; }
    .pyramid-tier { transition: transform 0.2s, box-shadow 0.2s; }
    .pyramid-tier:hover { transform: translateY(-2px); }
    .step-connector { flex: 1; height: 2px; min-width: 1rem; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">

  <!-- Nav -->
  <nav class="sticky top-0 z-50 backdrop-blur-md bg-white/80 dark:bg-slate-950/80 border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <span class="text-sm font-semibold text-blue-600 dark:text-blue-400 tracking-tight" data-i18n="footer.text"></span>
      <div class="flex items-center gap-3">
        <button id="theme-toggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" aria-label="Toggle theme">
          <svg id="icon-sun" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg id="icon-moon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        <div class="flex items-center gap-1 bg-slate-100 dark:bg-slate-800 rounded-lg p-1">
          <button data-locale="zh-tw" class="locale-btn px-2.5 py-1 text-xs font-medium rounded-md transition-colors">繁中</button>
          <button data-locale="en" class="locale-btn px-2.5 py-1 text-xs font-medium rounded-md transition-colors">EN</button>
          <button data-locale="ja" class="locale-btn px-2.5 py-1 text-xs font-medium rounded-md transition-colors">日本語</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-12 space-y-24">

    <!-- 1. Hero -->
    <section id="hero" class="text-center space-y-8">
      <div class="space-y-4">
        <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent" data-i18n="hero.title"></h1>
        <p class="text-lg sm:text-xl text-slate-600 dark:text-slate-400 max-w-3xl mx-auto leading-relaxed" data-i18n="hero.subtitle"></p>
      </div>

      <!-- Toggle -->
      <div class="inline-flex bg-slate-100 dark:bg-slate-800 rounded-xl p-1 gap-1">
        <button id="btn-as-is" class="toggle-btn px-5 py-2.5 rounded-lg text-sm font-semibold transition-all"></button>
        <button id="btn-to-be" class="toggle-btn px-5 py-2.5 rounded-lg text-sm font-semibold transition-all"></button>
      </div>

      <!-- Bullet list -->
      <div id="hero-bullets" class="max-w-xl mx-auto text-left"></div>
    </section>

    <!-- 2. Skill Roles -->
    <section id="roles" class="space-y-8">
      <div class="text-center space-y-2">
        <h2 class="text-2xl sm:text-3xl font-bold" data-i18n="roles.heading"></h2>
        <p class="text-slate-600 dark:text-slate-400" data-i18n="roles.subheading"></p>
      </div>
      <div id="roles-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5"></div>
    </section>

    <!-- 3. Figma Token Pyramid -->
    <section id="figma" class="space-y-8">
      <div class="text-center space-y-2">
        <h2 class="text-2xl sm:text-3xl font-bold" data-i18n="figma.heading"></h2>
        <p class="text-slate-600 dark:text-slate-400" data-i18n="figma.subheading"></p>
      </div>
      <div id="figma-pyramid" class="flex flex-col items-center gap-3 max-w-lg mx-auto"></div>
    </section>

    <!-- 4. Pipeline -->
    <section id="pipeline" class="space-y-8">
      <h2 class="text-2xl sm:text-3xl font-bold text-center" data-i18n="pipeline.heading"></h2>

      <div id="stepper" class="flex items-center justify-center gap-0 overflow-x-auto pb-2 px-2"></div>

      <div class="text-center">
        <button id="simulate-btn" class="inline-flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl shadow-lg shadow-blue-600/25 transition-all hover:shadow-blue-600/40 hover:-translate-y-0.5 active:translate-y-0"></button>
      </div>

      <div id="simulate-success" class="hidden text-center">
        <div class="inline-flex items-center gap-2 px-4 py-2 bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300 rounded-lg text-sm font-medium animate-check-pop">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          <span data-i18n="pipeline.simulate_success"></span>
        </div>
      </div>

      <div id="issues-container" class="grid grid-cols-1 sm:grid-cols-3 gap-4 max-w-4xl mx-auto"></div>
    </section>

    <!-- 5. Roadmap -->
    <section id="roadmap" class="space-y-8 pb-12">
      <h2 class="text-2xl sm:text-3xl font-bold text-center" data-i18n="roadmap.heading"></h2>
      <div id="roadmap-timeline" class="max-w-2xl mx-auto space-y-0"></div>
    </section>

  </main>

  <footer class="border-t border-slate-200 dark:border-slate-800 py-6 text-center text-sm text-slate-500">
    <span data-i18n="footer.text"></span>
  </footer>

  <!-- file:// fallback: must load before app script -->
  <script src="i18n/embed.js"></script>

  <script>
    // Embedded i18n for file:// compatibility. Source of truth: i18n/*.json
    const I18N_DATA = null; // loaded async or embedded below

    let currentLocale = localStorage.getItem('demo-locale') || 'zh-tw';
    let heroMode = 'as_is';
    let issuesVisible = false;
    let translations = {};

    const LOCALES = ['zh-tw', 'en', 'ja'];

    async function loadTranslations() {
      const embedded = window.__I18N_EMBEDDED__;
      if (embedded) {
        translations = embedded;
        return;
      }
      const results = {};
      for (const loc of LOCALES) {
        try {
          const res = await fetch(`i18n/${loc}.json`);
          if (res.ok) results[loc] = await res.json();
        } catch (_) { /* file:// fallback */ }
      }
      if (Object.keys(results).length === LOCALES.length) {
        translations = results;
      }
    }

    function t(key, loc = currentLocale) {
      const parts = key.split('.');
      let obj = translations[loc];
      for (const p of parts) {
        if (!obj) return key;
        obj = obj[p];
      }
      return obj ?? key;
    }

    function applyStaticI18n() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const val = t(key);
        if (typeof val === 'string') el.textContent = val;
      });
      document.title = t('meta.title');
      document.documentElement.lang = currentLocale === 'zh-tw' ? 'zh-TW' : currentLocale;
    }

    function updateLocaleButtons() {
      document.querySelectorAll('.locale-btn').forEach(btn => {
        const active = btn.dataset.locale === currentLocale;
        btn.className = `locale-btn px-2.5 py-1 text-xs font-medium rounded-md transition-colors ${
          active
            ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm'
            : 'text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-200'
        }`;
      });
    }

    function renderHeroToggle() {
      const btnAsIs = document.getElementById('btn-as-is');
      const btnToBe = document.getElementById('btn-to-be');
      btnAsIs.textContent = t('hero.toggle_as_is');
      btnToBe.textContent = t('hero.toggle_to_be');

      const asIsActive = heroMode === 'as_is';
      btnAsIs.className = `toggle-btn px-5 py-2.5 rounded-lg text-sm font-semibold transition-all ${
        asIsActive
          ? 'bg-white dark:bg-slate-700 text-red-600 dark:text-red-400 shadow-md'
          : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'
      }`;
      btnToBe.className = `toggle-btn px-5 py-2.5 rounded-lg text-sm font-semibold transition-all ${
        !asIsActive
          ? 'bg-white dark:bg-slate-700 text-emerald-600 dark:text-emerald-400 shadow-md'
          : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'
      }`;
    }

    function renderHeroBullets() {
      const container = document.getElementById('hero-bullets');
      const items = heroMode === 'as_is' ? t('hero.as_is_items') : t('hero.to_be_items');
      const isAsIs = heroMode === 'as_is';
      const borderColor = isAsIs ? 'border-red-400 dark:border-red-500' : 'border-emerald-400 dark:border-emerald-500';
      const dotColor = isAsIs ? 'bg-red-500' : 'bg-emerald-500';

      container.innerHTML = `<ul class="space-y-3 border-l-4 ${borderColor} pl-5 animate-fade-slide-up">${
        items.map(item => `
          <li class="flex items-start gap-3">
            <span class="mt-1.5 w-2 h-2 rounded-full ${dotColor} flex-shrink-0"></span>
            <span class="text-base font-medium">${item}</span>
          </li>
        `).join('')
      }</ul>`;
    }

    function renderRoles() {
      const grid = document.getElementById('roles-grid');
      const cards = t('roles.cards');
      grid.innerHTML = cards.map((card, i) => `
        <div class="group bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6 shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
          <div class="flex items-center justify-between mb-4">
            <span class="text-xs font-bold text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 px-2.5 py-1 rounded-full">0${i + 1}</span>
            <span class="text-xs font-medium px-2.5 py-1 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300">${card.badge}</span>
          </div>
          <h3 class="text-lg font-bold mb-2 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">${card.title}</h3>
          <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed">${card.description}</p>
        </div>
      `).join('');
    }

    function renderFigmaPyramid() {
      const container = document.getElementById('figma-pyramid');
      const tiers = t('figma.tiers');
      const widths = ['w-full max-w-xs', 'w-full max-w-sm', 'w-full max-w-md'];

      container.innerHTML = tiers.map((tier, i) => {
        const lockIcon = tier.locked ? '🔒' : '🔓';
        const lockColor = tier.locked ? 'text-red-500' : 'text-emerald-500';
        const borderColor = tier.locked
          ? 'border-red-200 dark:border-red-800/60'
          : 'border-emerald-300 dark:border-emerald-700';
        const bgColor = tier.locked
          ? 'bg-red-50/50 dark:bg-red-950/20'
          : 'bg-emerald-50/50 dark:bg-emerald-950/20';

        return `
          <div class="pyramid-tier ${widths[i]} ${bgColor} ${borderColor} border-2 rounded-xl p-5 text-center shadow-md">
            <div class="flex items-center justify-center gap-2 mb-2">
              <span class="text-xl">${lockIcon}</span>
              <span class="text-xs font-semibold ${lockColor}">${tier.lock_label}</span>
            </div>
            <h3 class="font-bold text-lg">${tier.name}</h3>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1 font-mono">${tier.tokens}</p>
          </div>
        `;
      }).join('');
    }

    function renderStepper() {
      const container = document.getElementById('stepper');
      const steps = t('pipeline.steps');

      container.innerHTML = steps.map((step, i) => {
        const isLast = i === steps.length - 1;
        return `
          <div class="flex items-center flex-shrink-0">
            <div class="flex flex-col items-center">
              <div class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-bold shadow-md shadow-blue-600/30">${i + 1}</div>
              <span class="mt-2 text-xs font-medium text-slate-600 dark:text-slate-400 whitespace-nowrap max-w-[5.5rem] text-center leading-tight">${step}</span>
            </div>
            ${!isLast ? '<div class="step-connector bg-blue-300 dark:bg-blue-700 mx-1 sm:mx-2 mt-[-1.25rem]"></div>' : ''}
          </div>
        `;
      }).join('');
    }

    function renderSimulateBtn() {
      document.getElementById('simulate-btn').textContent = t('pipeline.simulate_btn');
    }

    function renderIssues(animate = false) {
      const container = document.getElementById('issues-container');
      if (!issuesVisible) {
        container.innerHTML = '';
        return;
      }
      const issues = t('pipeline.mock_issues');
      const tagColors = { Schema: 'bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300', UI: 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300', BDD: 'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300' };

      container.innerHTML = issues.map((issue, i) => `
        <div class="issue-card ${animate ? 'show' : ''} bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-5 shadow-md" style="${animate ? `transition-delay: ${i * 120}ms` : ''}">
          <div class="flex items-center gap-2 mb-3">
            <span class="text-xs font-mono font-bold text-slate-400">${issue.id}</span>
            <span class="text-xs font-semibold px-2 py-0.5 rounded ${tagColors[issue.tag] || 'bg-slate-100 text-slate-600'}">【${issue.tag}】</span>
          </div>
          <p class="text-sm font-medium leading-relaxed">${issue.title}</p>
        </div>
      `).join('');

      if (animate) {
        requestAnimationFrame(() => {
          container.querySelectorAll('.issue-card').forEach((card, i) => {
            setTimeout(() => card.classList.add('show'), i * 120);
          });
        });
      }
    }

    function renderRoadmap() {
      const container = document.getElementById('roadmap-timeline');
      const phases = t('roadmap.phases');

      container.innerHTML = phases.map((phase, i) => {
        const isLast = i === phases.length - 1;
        return `
          <div class="relative flex gap-5 ${!isLast ? 'pb-10' : ''}">
            ${!isLast ? '<div class="absolute left-[1.125rem] top-10 bottom-0 w-0.5 bg-blue-200 dark:bg-blue-800"></div>' : ''}
            <div class="w-9 h-9 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-bold flex-shrink-0 shadow-md z-10">${i + 1}</div>
            <div class="flex-1 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-5 shadow-md">
              <h3 class="font-bold text-lg">${phase.title}</h3>
              <p class="text-sm text-slate-600 dark:text-slate-400 mt-1">${phase.description}</p>
              ${phase.risk ? `<p class="text-sm font-medium text-amber-600 dark:text-amber-400 mt-3 px-3 py-2 bg-amber-50 dark:bg-amber-900/20 rounded-lg">${phase.risk}</p>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function applyI18n() {
      applyStaticI18n();
      updateLocaleButtons();
      renderHeroToggle();
      renderHeroBullets();
      renderRoles();
      renderFigmaPyramid();
      renderStepper();
      renderSimulateBtn();
      renderIssues(false);
      renderRoadmap();
    }

    function setLocale(loc) {
      currentLocale = loc;
      localStorage.setItem('demo-locale', loc);
      applyI18n();
    }

    function initTheme() {
      const stored = localStorage.getItem('demo-theme');
      if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('demo-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    document.getElementById('btn-as-is').addEventListener('click', () => { heroMode = 'as_is'; renderHeroToggle(); renderHeroBullets(); });
    document.getElementById('btn-to-be').addEventListener('click', () => { heroMode = 'to_be'; renderHeroToggle(); renderHeroBullets(); });

    document.getElementById('simulate-btn').addEventListener('click', () => {
      issuesVisible = true;
      document.getElementById('simulate-success').classList.remove('hidden');
      renderIssues(true);
    });

    document.querySelectorAll('.locale-btn').forEach(btn => {
      btn.addEventListener('click', () => setLocale(btn.dataset.locale));
    });

    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

    initTheme();
    loadTranslations().then(() => applyI18n());
  </script>

</body>
</html>
