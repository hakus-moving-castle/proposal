<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proposals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <style>
    .dot-bullet { @apply w-1.5 h-1.5 rounded-full bg-orange-400 mt-2 flex-shrink-0; }
    .demo-card { @apply block bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6 shadow-sm hover:border-orange-300 dark:hover:border-orange-700 hover:shadow-md transition-all; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen">

  <header class="border-b border-slate-200 dark:border-slate-800 bg-white/90 dark:bg-slate-950/90 backdrop-blur sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-lg font-bold text-blue-600 dark:text-blue-400" id="site-title">Proposals</h1>
      <div class="flex items-center gap-2">
        <button id="theme-toggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800" aria-label="Theme">
          <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        <div class="flex gap-1 bg-slate-100 dark:bg-slate-800 rounded-lg p-1">
          <button data-locale="zh-tw" class="locale-btn px-2 py-1 text-xs rounded-md">繁中</button>
          <button data-locale="en" class="locale-btn px-2 py-1 text-xs rounded-md">EN</button>
          <button data-locale="ja" class="locale-btn px-2 py-1 text-xs rounded-md">日本語</button>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-12 space-y-8">
    <section class="space-y-2">
      <h2 class="text-3xl font-bold" id="hero-title"></h2>
      <p class="text-slate-600 dark:text-slate-400" id="hero-subtitle"></p>
    </section>

    <section class="space-y-4">
      <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wide" id="list-heading"></h3>
      <div id="demo-list" class="space-y-3"></div>
    </section>

    <footer class="text-center text-xs text-slate-400 pt-8 border-t border-slate-200 dark:border-slate-800" id="footer-text"></footer>
  </main>

  <script>
    const I18N = {
      'zh-tw': {
        title: 'Proposals',
        hero: '互動式提案報告',
        subtitle: 'AI 產出的單頁滾動簡報，支援繁中 / 英文 / 日文。',
        list: '報告列表',
        footer: 'hakus-moving-castle/proposal',
        demos: [{
          slug: 'renovation-plan',
          title: '專案全面翻新：AI 驅動的敏捷考古與重構計畫',
          desc: 'AI 考古、資料邊界、Figma 設計系統、Matt Pocock Skills 流水線。',
          tags: ['zh-tw', 'en', 'ja']
        }]
      },
      en: {
        title: 'Proposals',
        hero: 'Interactive Proposal Reports',
        subtitle: 'Single-page scrollable decks generated by AI. zh-tw / en / ja.',
        list: 'Reports',
        footer: 'hakus-moving-castle/proposal',
        demos: [{
          slug: 'renovation-plan',
          title: 'Full Project Renovation: AI-Driven Agile Archaeology & Refactor',
          desc: 'AI archaeology, data boundaries, Figma design system, Matt Pocock Skills pipeline.',
          tags: ['zh-tw', 'en', 'ja']
        }]
      },
      ja: {
        title: 'Proposals',
        hero: 'インタラクティブ提案レポート',
        subtitle: 'AIが生成する単一ページスクロール簡報。繁中 / 英語 / 日本語対応。',
        list: 'レポート一覧',
        footer: 'hakus-moving-castle/proposal',
        demos: [{
          slug: 'renovation-plan',
          title: 'プロジェクト全面刷新：AI駆動のアジャイル考古学とリファクタリング',
          desc: 'AI考古学、データ境界、Figmaデザインシステム、Matt Pocock Skillsパイプライン。',
          tags: ['zh-tw', 'en', 'ja']
        }]
      }
    };

    let locale = localStorage.getItem('site-locale') || 'zh-tw';
    const t = () => I18N[locale];

    function render() {
      const d = t();
      document.title = d.title;
      document.documentElement.lang = locale === 'zh-tw' ? 'zh-TW' : locale;
      document.getElementById('site-title').textContent = d.title;
      document.getElementById('hero-title').textContent = d.hero;
      document.getElementById('hero-subtitle').textContent = d.subtitle;
      document.getElementById('list-heading').textContent = d.list;
      document.getElementById('footer-text').textContent = d.footer;
      document.getElementById('demo-list').innerHTML = d.demos.map(demo => `
        <a href="demos/${demo.slug}/index.html" class="demo-card group">
          <div class="flex gap-3 items-start">
            <span class="dot-bullet"></span>
            <div class="flex-1 min-w-0">
              <h4 class="font-bold text-lg group-hover:text-orange-600 dark:group-hover:text-orange-400 transition-colors">${demo.title}</h4>
              <p class="text-sm text-slate-600 dark:text-slate-400 mt-1">${demo.desc}</p>
              <div class="flex gap-1.5 mt-3">${demo.tags.map(tag => `<span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 dark:bg-slate-800 text-slate-500">${tag}</span>`).join('')}</div>
            </div>
            <span class="text-slate-300 dark:text-slate-600 group-hover:text-orange-400 transition-colors">→</span>
          </div>
        </a>`).join('');
      document.querySelectorAll('.locale-btn').forEach(btn => {
        const active = btn.dataset.locale === locale;
        btn.className = `locale-btn px-2 py-1 text-xs rounded-md ${active ? 'bg-white dark:bg-slate-700 text-blue-600 shadow-sm' : 'text-slate-500'}`;
      });
    }

    document.querySelectorAll('.locale-btn').forEach(b => b.addEventListener('click', () => {
      locale = b.dataset.locale;
      localStorage.setItem('site-locale', locale);
      render();
    }));
    document.getElementById('theme-toggle').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('site-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('site-theme') === 'dark' || (!localStorage.getItem('site-theme') && matchMedia('(prefers-color-scheme: dark)').matches))
      document.documentElement.classList.add('dark');

    render();
  </script>
</body>
</html>
